# JasperReports font extension registration for the PDS (CS Form 212 Revised 2025)
# vector templates. Registers the embedded font families declared in fonts/fonts.xml
# so fontName="Arial" / "Arial Narrow" / "Tahoma" / "Calibri" / "Arial Black"
# resolve to embedded TrueType outlines at fill/PDF-export time.
net.sf.jasperreports.extension.registry.factory.fonts=net.sf.jasperreports.engine.fonts.SimpleFontExtensionsRegistryFactory
net.sf.jasperreports.extension.simple.font.families.pdsfonts=fonts/fonts.xml
