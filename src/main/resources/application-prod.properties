server.servlet.context-path=/hrisp
server.servlet.session.timeout=15m

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

file.upload-dir=/hrisp/uploads

# Spring Data REST
spring.data.rest.base-path=/api
spring.data.rest.detection-strategy=annotated

# PROD settings
spring.datasource.initialization-mode=never
spring.jpa.hibernate.ddl-auto=none


# MySQL DataSource config
spring.datasource.url=jdbc:mysql://localhost:3306/hrisp?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=Asia/Manila&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:cdsiadmin}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Manila

# Data migration CSV directory (one-time use — all migrate calls are commented out in AppRunner)
migration.csv.dir=/opt/hrisp/migration-data
