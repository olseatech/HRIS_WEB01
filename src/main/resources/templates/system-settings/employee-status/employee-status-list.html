<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<th:block th:replace="fragments/common::header-meta"></th:block>

    <!-- common import of css & js goes here -->
    <th:block th:replace="fragments/common::header-import-css"></th:block>
    <th:block th:replace="fragments/common::header-import-js"></th:block>
    
	<title>Human Resource Information System</title>


</head>

<body>

	<!-- Main Navbar -->
	<div th:replace="fragments/common::main-navbar"></div>
	<!-- /Main Navbar -->

					
	<!-- Page content -->
	<div class="page-content">	
		
		<!-- Main sidebar -->
		<div th:replace="fragments/common::main-sidebarnav"></div>
		<!-- /Main sidebar -->


		<!-- Main content -->
		<div class="content-wrapper">

			<!-- Page header -->
			<div class="page-header">
				<div class="page-header-content header-elements-md-inline">
					<div class="page-title d-flex">
						<h4><span class="font-weight-semibold">Employee Status List</span></h4>
						<a href="#" class="header-elements-toggle text-default d-md-none"><i class="icon-more"></i></a>
					</div>					
				</div>
			</div>
			<!-- /page header -->
			
			
			<!-- Vertical form modal -->
			<div id="modal_form_vertical" class="modal fade" tabindex="-1" >
				<div class="modal-dialog">
					<div class="modal-content">
						<div class="modal-header bg-primary">
							<h5 class="modal-title">Employee Status Details</h5>
							<button type="button" class="close" data-dismiss="modal">&times;</button>
						</div>
                        <!-- POST MAPPING CONTROLLER -->
						<form th:action="@{/save-employee-status}" method="post" class="form-horizontal" th:object="${employeeStatus}">
							<input type="hidden" th:field="*{id}" id="id"/>
							<div class="modal-body">
								<div class="form-group row">									
									<label class="col-form-label col-sm-4">Employee Status Name</label>
									<div class="col-sm-8">
										<span class="validationError text-danger" th:if="${#fields.hasErrors('employeeStatusName')}" th:errors="*{employeeStatusName}"></span>
										<input type="text" id="employeeStatusName" th:field="*{employeeStatusName}" placeholder="Employee status name" class="form-control">
                                        
									</div>
								</div>	
                                <!--<div class="form-group row">									
									<label class="col-form-label col-sm-4">Payroll Behavior</label>
									<div class="col-sm-8">
										<span class="validationError text-danger" th:if="${#fields.hasErrors('payrollBehavior')}" th:errors="*{payrollBehavior}"></span>
                                        <select class="form-control" th:field="*{payrollBehavior}">
                                            <option selected disabled value="">--Select from option--</option>
                                            <option value="DAILY RATE">Daily Rate</option>
                                            <option value="MONTHLY RATE">Monthly Rate</option>
                                        </select>
                                        
									</div>
								</div>	-->
                                
                                <div class="form-group row">									
									<label class="col-form-label col-sm-4">Employment Type</label>
									<div class="col-sm-8">
										<span class="validationError text-danger" th:if="${#fields.hasErrors('employmentType')}" th:errors="*{employmentType}"></span>
                                        <select class="form-control" th:field="*{employmentType}">
                                            <option selected disabled value="">--Select from option--</option>
                                            <option value="PLANTILLA">Plantilla</option>
                                            <option value="NON-PLANTILLA">Non-Plantilla</option>
                                        </select>
                                        
									</div>
								</div>
                                
							</div>

							<div class="modal-footer">
								<button type="button" class=" btnClose btn btn-link" data-dismiss="modal">Close</button>
								<button type="submit" class="btn bg-primary">Submit</button>
							</div>
						</form>
					</div>
				</div>
			</div>
			<!-- /Vertical form modal -->

			<!-- Content area -->
			<div class="content pt-0">

				<!-- Dashboard content -->
				<div class="row">
					<div class="col-xl-12">
						<!-- Basic datatable -->
						<div class="card p-3">
							<div class="card-header header-elements-inline">
								<h5 class="card-title">School List</h5>
								<div class="header-elements">
									<div class="list-icons">				                				
				                		<button type="button" class="btn btn-outline-primary" data-toggle="modal" data-target="#modal_form_vertical">Add Record</button>
				                	</div>
			                	</div>
							</div>
		
		
							<table class="table table-basic table-hover" id="table-list">
								<thead>
									<tr>
										<th>Employee Status Name</th>
                                        <th>Employment Type</th>
                                        <!--<th>Payroll Behavior</th>
                                        <th>Status</th>	-->				
										<th class="text-center">Actions</th>
									</tr>
								</thead>
								<tbody>
									<th:block th:each="employeeStatus : ${listOfEmployeeStatus}">
										<tr>
											<td id="employeeStatusName" th:text="${employeeStatus.employeeStatusName}"></td>
                                            <td id="employmentType" th:text="${employeeStatus.employmentType}"></td>
                                            <!--<td id="employeeStatusName" th:text="${employeeStatus.getPayrollBehavior()}"></td>

                                            <td id="employeeStatusActive">
												<form th:action="@{/update-employee-status/{id}(id=${employeeStatus.id})}" method="post">
													<input type="hidden" name="_method" value="put" />
													<a href="#" onclick="event.preventDefault(); this.closest('form').submit();" >
														<span th:text="${employeeStatus.isActive() ? 'Active' : 'Inactive'}" 
														  th:class="${employeeStatus.isActive() ? 'text-success' : 'text-danger'}"></span>
													</a>
												</form>
											</td>																				-->
											<td class="text-center" width="250px;">
												<button id="editEmployeeStatusButton" type="button" class="showDetails btn btn-primary"
                                                 th:data-row-employeeStatusName="${employeeStatus.employeeStatusName}"	                                                 
                                                 th:data-row-employmentType="${employeeStatus.employmentType}"	
                                                 th:data-row-id="${employeeStatus.id}"
												data-toggle="modal" data-target="#modal_form_vertical"
                                                >View Record</button>
											</td>
										</tr>
									</th:block>							
								</tbody>
							</table>
						</div>
						<!-- /basic datatable -->					
					</div>
				</div>
				<!-- /dashboard content -->

			</div>
			<!-- /content area -->

			<!-- Footer -->
			<div th:replace="fragments/common::footer"></div>
			<!-- /Footer -->    

		</div>
		<!-- /main content -->

	</div>
	<!-- /page content -->

	<script th:inline="javascript">
	
		$(document).ready(function() {
			//$(".nav-link").removeClass("active");
			//$("#academicHonorsNav").addClass("active");
			
			$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
			$("#systemSettingsNav").addClass("nav-item-expanded nav-item-open");
			$("#employeeStatusNav").addClass("active");
			
			
			let msgCode = /*[[${uxmessage == null ? '' : uxmessage.code} ]]*/'';
			let msgDesc = /*[[${uxmessage == null ? '' : uxmessage.message}]]*/'';
			
			if(msgCode === 'ERROR'){
				$('#modal_form_vertical').modal('show');
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
			} else if(msgCode === 'SUCCESS'){
				swal({
					title: "Success!",
					text: msgDesc,
					icon: "success",
					buttons: false,
		            timer: 2000,
				});
			}
			
			
		});
		
		$('#table-list').DataTable({
				"lengthMenu": [10, 25, 50],
				"ordering": false,                
		});
					
		$(document).on("click", ".showDetails", function() {
            var id = $(this).attr('data-row-id');
            var employeeStatusName = $(this).attr('data-row-employeeStatusName');
            var employmentType = $(this).attr('data-row-employmentType');
            //var payrollBehavior = $(this).attr('data-row-payrollBehavior');
            
            $("#modal_form_vertical").find("#id").val(id);
            $("#modal_form_vertical").find("#employeeStatusName").val(employeeStatusName);
            $("#modal_form_vertical").find("#employmentType").val(employmentType);
            //$("#modal_form_vertical").find("#payrollBehavior").val(payrollBehavior);
        });
        
	</script>
</body>
</html>
