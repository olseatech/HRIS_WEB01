<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<th:block th:replace="fragments/common::header-meta"></th:block>

    <!-- common import of css & js goes here -->
    <th:block th:replace="fragments/common::header-import-css"></th:block>
    <link rel="stylesheet" th:href="@{/js/jquery.flexdatalist.min.css}">
    <th:block th:replace="fragments/common::header-import-js"></th:block>    
    
	<title>Human Resource Information System</title>

</head>

<body>

	<!-- Main Navbar -->
	<div th:replace="fragments/common::main-navbar"></div>
	<!-- /Main Navbar -->

					
	<!-- Page content -->
	<div class="page-content">	
		
		<!-- Main sidebar -->
		<div th:replace="fragments/common::main-sidebarnav"></div>
		<!-- /Main sidebar -->


		<!-- Main content -->
		<div class="content-wrapper">			
			
			<!-- Vertical form modal -->
			<div id="modal_form_vertical" class="modal fade" tabindex="-1" >
				<div class="modal-dialog">
					<div class="modal-content">
						<div class="modal-header bg-primary">
							<h5 class="modal-title">District Details</h5>
							<button type="button" class="close" data-dismiss="modal">&times;</button>
						</div>
                        <!-- POST MAPPING CONTROLLER -->
						<form th:action="@{/save-district}" method="post" class="form-horizontal" th:object="${district}">
							<input type="hidden" th:field="*{id}" id="id"/>
							<div class="modal-body">
								<div class="form-group row">									
									<label class="col-form-label col-sm-4">District Name</label>
									<div class="col-sm-8">
										<span class="validationError text-danger" th:if="${#fields.hasErrors('districtName')}" th:errors="*{districtName}"></span>
										<input type="text" th:field="*{districtName}" placeholder="District Name" class="form-control">
									</div>
								</div>								
							</div>

							<div class="modal-footer">
								<button type="button" class=" btnClose btn btn-link" data-dismiss="modal">Close</button>
								<button type="submit" class="btn bg-primary">Submit</button>
							</div>
						</form>
					</div>
				</div>
			</div>
			<!-- /Vertical form modal -->

			<!-- Content area -->
			<div class="content pt-0">

				<!-- Dashboard content -->
				<div class="row">
					<div class="col-xl-12">
						
						
						<div class="card mt-3">
					<div class="card-header header-elements-inline">
						<h5 class="card-title">District List</h5>
						<div class="header-elements">
							<div class="list-icons">				                				
				           		<button type="button" class="btn btn-outline-primary" data-toggle="modal" data-target="#modal_form_vertical">Add Record</button>
				           	</div>
						</div>
					</div>

					<div class="card-body">
						List of All Employee's <code>Active</code> and <code>In-Active</code>. Type to search desired employee.
					</div>

					<table class="table table-bordered table-hover datatable-highlight">
						<thead>
							<tr>
								<th>District Name</th>
								<th class="text-center">Actions</th>
							</tr>
						</thead>
						<tbody>
							<th:block th:each="district : ${districtList}">
								<tr>
									<td th:text="${district.getDistrictName()}">Full Name</td>
									<td class="text-center" width="250px;">
												<button id="editButton" type="button" class="showDetails btn btn-primary"
                                                 th:data-row-divisionName="${district.getDistrictName()}"
                                                 
                                                 th:data-row-id="${district.getId()}"
												data-toggle="modal" data-target="#modal_form_vertical"
                                                >View Record</button>
									</td>
								</tr>
							</th:block>		
							
							
						</tbody>
					</table>
				</div>
						
						
								
					</div>
				</div>
				<!-- /dashboard content -->

			</div>
			<!-- /content area -->

			<!-- Footer -->
			<div th:replace="fragments/common::footer"></div>
			<!-- /Footer -->    

		</div>
		<!-- /main content -->

	</div>
	<!-- /page content -->

	<script th:src="@{/js/jquery.flexdatalist.min.js}"></script>
	<script th:inline="javascript">
	
		$(document).ready(function() {
			$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
			$("#systemSettingsNav").addClass("nav-item-expanded nav-item-open");
			$("#districtNav").addClass("active");
			
			$('.flexdatalist').flexdatalist();
			
			
			let msgCode = /*[[${uxmessage == null ? '' : uxmessage.code} ]]*/'';
			let msgDesc = /*[[${uxmessage == null ? '' : uxmessage.message}]]*/'';
			
			if(msgCode === 'ERROR'){
				$('#modal_form_vertical').modal('show');
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
			} else if(msgCode === 'SUCCESS'){
				swal({
					title: "Success!",
					text: msgDesc,
					icon: "success",
					buttons: false,
		            timer: 2000,
				});
			}
			
			
		});
		
		$('#table-list').DataTable({});
		
		$(document).on("click", ".showDetails", function() {
            var id = $(this).attr('data-row-id');
            var divisionName = $(this).attr('data-row-divisionName');
			var approver1 = $(this).attr('data-row-approver1');
			var approverName = $(this).attr('data-row-approverName');
            
            // Check if id is not null or empty
            if (id && id.trim() !== "") {
                $("#activeField").removeClass("d-none");
            }
            
            $("#modal_form_vertical").find("#id").val(id);            
            $("#modal_form_vertical").find("#divisionName").val(divisionName);
            //$("#modal_form_vertical").find("#approver1").val(approverName);
            
            $('#approver1').flexdatalist({
                value: approverName
            });
            
            //$('#approver1').val(approverName);
            //$("#modal_form_vertical").find("#approver1").val(approver1);
        });
        $(document).on("click", ".close",".btnClose", function() {
            var id = $(this).attr('data-row-id');
            var degreeName = $(this).attr('data-row-degreeName');
			

            $("#activeField").addClass("d-none");
            $("#modal_form_vertical").find("#id").val("");
            $("#modal_form_vertical").find("#firstName").val("");
        });
        $(document).on("click", ".btnClose", function() {
            var id = $(this).attr('data-row-id');
            var firstName = $(this).attr('data-row-firstName');

            $("#activeField").addClass("d-none");
            $("#modal_form_vertical").find("#id").val("");
            $("#modal_form_vertical").find("#firstName").val("");
        });
	</script>
</body>
</html>
