<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<th:block th:replace="fragments/common::header-meta"></th:block>

    <!-- common import of css & js goes here -->
    <th:block th:replace="fragments/common::header-import-css"></th:block>
    <th:block th:replace="fragments/common::header-import-js"></th:block>
    
	<title>Human Resource Information System</title>


</head>

<body>

	<!-- Main Navbar -->
	<div th:replace="fragments/common::main-navbar"></div>
	<!-- /Main Navbar -->

					
	<!-- Page content -->
	<div class="page-content">	
		
		<!-- Main sidebar -->
		<div th:replace="fragments/common::main-sidebarnav"></div>
		<!-- /Main sidebar -->


		<!-- Main content -->
		<div class="content-wrapper">

			<!-- Page header -->
			<div class="page-header">
				<div class="page-header-content header-elements-md-inline">
					<div class="page-title d-flex">
						<h4><span class="font-weight-semibold">My Clearance List</span></h4>
						<a href="#" class="header-elements-toggle text-default d-md-none"><i class="icon-more"></i></a>
					</div>					
				</div>
			</div>
			<!-- /page header -->
			
			
			<!-- Vertical form modal -->
			<div id="modal_form_vertical" class="modal fade" tabindex="-1" >
				<div class="modal-dialog">
					<div class="modal-content">
						<div class="modal-header bg-primary">
							<h5 class="modal-title">Clearance Information</h5>
							<button type="button" class="close" data-dismiss="modal">&times;</button>
						</div>
						<form th:action="@{/addMyClearance}" method="post" class="form-horizontal" th:object="${clearance}">
							<input type="hidden" th:field="*{id}" name="id" id="id">
							<input type="hidden" th:field="*{employee.id}" name="employeeId" id="employeeId">
							<input type="hidden" th:field="*{employee.empHashCode}" name="empHashCode" id="empHashCode">
							<input type="hidden" th:field="*{showMode}" name="showMode" id="showMode" value="">
							<div class="modal-body">
									<div class="form-group">
										<div class="row">
											<div class="col-sm-8">
												<label for="addressTo">To</label>
												<span class="validationError text-danger" th:if="${#fields.hasErrors('addressTo')}" th:errors="*{addressTo}"></span>
												<input id="addressTo" name="addressTo" th:field="*{addressTo}" type="text" class="form-control required-field-hrisp">										
											</div>	
											
											<div class="col-sm-4">
												<label for="effectiveDate">Effectivity Date</label>
												<span class="validationError text-danger" th:if="${#fields.hasErrors('effectiveDate')}" th:errors="*{effectiveDate}"></span>
												<input id="effectiveDate" name="effectiveDate" th:field="*{effectiveDate}" type="date" class="form-control required-field-hrisp" >
											</div>							                
										               
											
										</div>
									</div>
													
									<div class="form-group">
										<div class="row">   
											<div class="col-sm-6">
												<label for="purpose">Purpose</label>
												<span class="validationError text-danger" th:if="${#fields.hasErrors('purpose')}" th:errors="*{purpose}"></span>
												<select id="purpose" name="purpose" class="form-control required-field-hrisp" th:field="*{purpose}">
													<option value="">SELECT VALUE</option>
													<option value="TRANSFER">TRANSFER</option>
													<option value="RETIREMENT">RETIREMENT</option>
													<option value="RESIGNATION">RESIGNATION</option>
													<option value="LEAVE">LEAVE</option>
													<option value="OTHERS MODE OF SEPARATION">OTHERS MODE OF SEPARATION</option>
												</select>
											</div>
															
											<div class="col-sm-6">
												<label for="otherPurpose">Other (Specify)</label>
												<input id="otherPurpose" name="otherPurpose" th:field="*{otherPurpose}" placeholder="Other (Specify)" type="text" class="form-control" readonly >
											</div>											
										</div>
									</div>						
								
							</div>

							<div class="modal-footer">
								<button type="button" class="btn btn-link" data-dismiss="modal">Close</button>
								<button type="submit" class="btn bg-primary">Submit</button>
							</div>
						</form>
					</div>
				</div>
			</div>
			<!-- /Vertical form modal -->

			<!-- Content area -->
			<div class="content pt-0">

				<!-- Dashboard content -->
				<div class="row">
					<div class="col-xl-12">
						<!-- Basic datatable -->
						<div class="card p-3">
							<div class="card-header header-elements-inline">
								<h5 class="card-title">My Clearance List</h5>
								<div class="header-elements">
									<div class="list-icons">				                				
				                		<button type="button" class="btn btn-outline-primary" data-toggle="modal" data-target="#modal_form_vertical">Add Record</button>
				                	</div>
			                	</div>
							</div>
		
		
							<table class="table table-basic table-hover" id="table-list">
								<thead>
									<tr>
										<th width="180px;">&nbsp;</th>
										<th>Filling Date</th>
										<th>Purpose</th>
										<th>Effectivity Date</th>	
										<th>Status</th>		
									</tr>
								</thead>
								<tbody>
									<tr th:if="${#lists.isEmpty(clearanceList)}">
										<td colspan="5" class="text-center text-muted">No clearance applications found.</td>
									</tr>
									<th:block th:each="clearance : ${clearanceList}">
										<tr>
											<!--
											<td class="text-center">
												<button id="editDegreeLevelButton" type="button" class="showDetails btn btn-primary"
			                                         th:data-row-purpose="${clearance.getPurpose()}"	
			                                         th:data-row-effectiveDate="${clearance.getEffectiveDate()}"
			                                         th:data-row-otherPurpose="${clearance.getOtherPurpose()}"
			                                         th:data-row-id="${clearance.getId()}"												 
													 data-toggle="modal" data-target="#modal_form_vertical">
													 View Record
												</button>
											</td>	
											-->
											<td class="text-center">
												<div class="list-icons">
													<div class="dropdown">
														<a href="#" class="list-icons-item" data-toggle="dropdown">
															<i class="icon-menu9"></i>
														</a>
		
														<div class="dropdown-menu dropdown-menu-right">
															<span class="showDetails dropdown-item"
			                                         th:data-row-purpose="${clearance.getPurpose()}"	
			                                         th:data-row-effectiveDate="${clearance.getEffectiveDate()}"
			                                         th:data-row-otherPurpose="${clearance.getOtherPurpose()}"
			                                         th:data-row-id="${clearance.getId()}"												 
													 data-toggle="modal" data-target="#modal_form_vertical" ><i class="icon-search4"></i> View Record</span>
															<a th:href="@{'/viewClearanceForm/' + ${clearance.getId()}}" target="_blank" class="dropdown-item"><i class="icon-file-pdf"></i> View Clearance Form</a>														
														</div>
													</div>
												</div>
											</td>	
											<td th:text="${clearance.transDate}">transDate</td>
											<td th:text="${clearance.purpose}">purpose</td>
											<td th:text="${clearance.effectiveDate}">effectiveDate</td>
											<td th:text="${clearance.status}">status</td>
										</tr>
									</th:block>							
								</tbody>
							</table>
						</div>
						<!-- /basic datatable -->					
					</div>
				</div>
				<!-- /dashboard content -->

			</div>
			<!-- /content area -->

			<!-- Footer -->
			<div th:replace="fragments/common::footer"></div>
			<!-- /Footer -->    

		</div>
		<!-- /main content -->

	</div>
	<!-- /page content -->

	<script th:inline="javascript">
	
		$(document).ready(function() {
			$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
			$("#myAccountNav").addClass("nav-item-expanded nav-item-open");
			$("#myClearanceNav").addClass("active");			
			
			$("#addressTo").val("CITY GOVERMENT OF MANILA");
			
			let msgCode = /*[[${msg == null ? '' : msg.code} ]]*/'';
			let msgDesc = /*[[${msg == null ? '' : msg.message}]]*/'';
			
			if(msgCode === 'ERROR'){
				$('#modal_form_vertical').modal('show');
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
			} else if(msgCode === 'SUCCESS'){
				swal({
					title: "Success!",
					text: msgDesc,
					icon: "success",
					buttons: false,
		            timer: 2000,
				});
			}
			
			document.getElementById("purpose").addEventListener("change", function() {
			  var otherInput = document.getElementById("otherPurpose");
			  var selectValue = this.value;
			  
			  if (selectValue === "OTHERS MODE OF SEPARATION") {
			    otherInput.removeAttribute("readonly");
			  } else {
			    otherInput.setAttribute("readonly", true);
			  }
			});
			
			
		});
		
		$('#table-list').DataTable({
				"lengthMenu": [10, 25, 50],
				"ordering": false,                
		});
		
		$(document).on("click", ".showDetails", function() {

			var id = $(this).attr('data-row-id');
			var purpose = $(this).attr('data-row-purpose');
			var effectiveDate = $(this).attr('data-row-effectiveDate');
			var otherPurpose = $(this).attr('data-row-otherPurpose');
			
			$("#modal_form_vertical").find("#id").val(id);
			$("#modal_form_vertical").find("#purpose").val(purpose);
			$("#modal_form_vertical").find("#effectiveDate").val(effectiveDate);
			$("#modal_form_vertical").find("#otherPurpose").val(otherPurpose);
		});
	</script>
</body>
</html>
