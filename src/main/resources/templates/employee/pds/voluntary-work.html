<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<th:block th:replace="fragments/common::header-meta"></th:block>
    <!-- common import of css & js goes here -->
    <th:block th:replace="fragments/common::header-import-css"></th:block>
    <th:block th:replace="fragments/common::header-import-js"></th:block>
	<title>Dashboard</title>
</head>
<body>
	<!-- Main Navbar -->
	<div th:replace="fragments/common::main-navbar"></div>
	<!-- /Main Navbar -->
	<!-- Page content -->
	<div class="page-content">
		<!-- Main sidebar -->
		<div th:replace="fragments/common::main-sidebarnav"></div>
		<!-- /Main sidebar -->

		<!-- Main content -->
		<div class="content-wrapper">
			<!-- Vertical form modal -->
			<div id="modal_form_vertical" class="modal fade" tabindex="-1">
				<div class="modal-dialog modal-lg">
					<div class="modal-content">
						<div class="modal-header bg-primary">
							<h5 class="modal-title">Voluntary Work Information</h5>
							<button type="button" class="close" data-dismiss="modal">&times;</button>
						</div>

						<form id="employeeForm" method="post" th:action="@{/addVoluntaryWork}" th:object="${voluntaryWork}">
							<input type="hidden" th:field="*{id}" name="id" id="id">
							<input type="hidden" th:field="*{employee.id}" name="employeeId" id="employeeId">
							<input type="hidden" th:field="*{employee.empHashCode}" name="empHashCode" id="empHashCode">
							<input type="hidden" th:field="*{showMode}" name="showMode" id="showMode" value="">
							<div class="modal-body">
								
								<div class="form-group">

									<div class="row">
										<div class="col-sm-12">
											<label for="orgName">Organization Name</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('orgName')}" th:errors="*{orgName}"></span>
											<input id="orgName" name="orgName" th:field="*{orgName}" placeholder="Position Title" type="text" class="form-control required-field-hrisp" >
										</div>	
									</div>


									<div class="row mt-3">
										<div class="col-sm-4">
											<label for="dateFrom">Date From</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('dateFrom')}" th:errors="*{dateFrom}"></span>
											<input type="text" class="form-control date-mask-input"
															   id="dateFrom_display"
															   placeholder="dd/mm/yyyy" maxlength="10" autocomplete="off" />
															<input type="hidden" id="dateFrom" name="dateFrom"
																   th:value="${voluntaryWork.dateFrom != null ? #temporals.format(voluntaryWork.dateFrom,'yyyy-MM-dd') : ''}" />
															<small class="text-danger date-error" style="display:none">Invalid date. Use dd/mm/yyyy.</small>
										</div>	
										<div class="col-sm-4">
											<label for="dateTo">Date To</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('dateTo')}" th:errors="*{dateTo}"></span>
											<input type="text" class="form-control date-mask-input"
															   id="dateTo_display"
															   placeholder="dd/mm/yyyy" maxlength="10" autocomplete="off" />
															<input type="hidden" id="dateTo" name="dateTo"
																   th:value="${voluntaryWork.dateTo != null ? #temporals.format(voluntaryWork.dateTo,'yyyy-MM-dd') : ''}" />
															<small class="text-danger date-error" style="display:none">Invalid date. Use dd/mm/yyyy.</small>
										</div>	
										<div class="col-sm-4 mt-2">
											<label for="rating">&nbsp;</label><br>
											<input th:field="*{upToPresent}" id="upToPresent" name="upToPresent" placeholder="N/A" type="checkbox"> 
											<label for="dateTo">Active</label>
										</div>
									</div>

									<div class="row mt-3">
										<div class="col-sm-4">
											<label for="noHours">Number of Hours</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('noHours')}" th:errors="*{noHours}"></span>
											<input id="noHours" name="noHours" th:field="*{noHours}" placeholder="Number of Hours" type="number" class="form-control required-field-hrisp" >
										</div>
										<div class="col-sm-4">
											<label for="natureOfWork">Nature of Work</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('natureOfWork')}" th:errors="*{natureOfWork}"></span>
											<input id="natureOfWork" name="natureOfWork" th:field="*{natureOfWork}" placeholder="Nature of Work" type="text" class="form-control required-field-hrisp" >
										</div>
										<div class="col-sm-4">
											<label for="address">Address</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></span>
											<input id="address" name="address" th:field="*{address}" placeholder="Address" type="text" class="form-control required-field-hrisp" >
										</div>
									</div>
								</div>
							</div>

							<div class="modal-footer">
								<button type="button" class="btn bg-secondary" data-dismiss="modal">Close</button>
								<button id="submitBtn" type="submit" class="btn bg-primary">Save Info</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		    <!-- /Vertical form modal -->

			<div class="content">

				<!-- Inner container -->
				<div class="d-flex align-items-start flex-column flex-md-row">

					<!-- Left content -->
					<div class="tab-content w-100 order-2 order-md-1">
						<div class="tab-pane fade active show" id="activity">
							
							
							
							<!-- Dashboard content -->
							<div class="row mt-3">
								<div class="col-xl-12">
									
									
									<div class="card">
										<div class="card-header header-elements-inline">
											<h5 class="card-title">Voluntary Work Information</h5>
											<div class="header-elements">
												<div class="list-icons">				                				
									           		<button id="addButton" type="button" class="btn btn-primary" data-toggle="modal" data-target="#modal_form_vertical">Add Record</button>
						           		<button id="clearAllVwButton" type="button" class="btn btn-danger ml-2" th:if="${not #lists.isEmpty(voluntaryWorkList)}">Clear All Records</button>
									           	</div>
											</div>
										</div>
					
										<div class="card-body">
											List of All Voluntary Work. Type to search desired voluntary work.
										</div>
					
										<form id="clearAllVwForm" method="post" th:action="@{/deleteAllVoluntaryWork/{id}(id=${employee.id})}">
							<input type="hidden" name="empHashCode" th:value="${employee.empHashCode}">
							<input type="hidden" name="showMode" th:value="${employee.showMode}">
						</form>
						<table class="table table-bordered table-hover datatable-highlight">
											<thead>
												<tr>
													<th width="150px;">&nbsp;</th>
													<th>Organization Name</th>
													<th>Date</th>
													<th>Number of Hours</th>		
													<th>Nature of Work</th>
													<th>Address</th>		
																				
												</tr>
											</thead>
											<tbody>
												<th:block th:each="work: ${voluntaryWorkList}">
													<tr>
														
														<td class="text-center">
															<button id="editDegreeLevelButton" type="button" class="showDetails btn btn-primary"
															th:data-row-orgName="${work.getOrgName()}"
															th:data-row-dateFrom="${work.getDateFrom()}" 
															th:data-row-dateTo="${work.getDateTo()}" 
															th:data-row-upToPresent="${work.isUpToPresent()}" 
															th:data-row-noHours="${work.getNoHours()}"
															th:data-row-natureOfWork="${work.getNatureOfWork()}"
															th:data-row-address="${work.getAddress()}"
															th:data-row-id="${work.getId()}"
															data-toggle="modal" data-target="#modal_form_vertical"
			                                                >View Record</button>
														</td>														
														
														<td th:text="${work.getOrgName()}"></td>
														<td th:text="${work.getInclusiveDates()}"></td>
														<td th:text="${work.getNoHours()}"></td>
														<td th:text="${work.getNatureOfWork()}"></td>
														<td th:text="${work.getAddress()}"></td>

													</tr>
												</th:block>		

											</tbody>
										</table>
									</div>

									<!-- PDS Section Navigation -->
									<div class="card mt-2">
										<div class="card-body d-flex justify-content-between align-items-center py-2">
											<a th:href="@{/employee/work-experience/{id}/{mode}/{hash}(id=${employee.id},mode=${employee.showMode},hash=${employee.empHashCode})}"
											   class="btn btn-outline-secondary btn-sm">
												&#8592; Previous: Work Experience
											</a>
											<button type="button" class="btn btn-success btn-sm"
												onclick="validateAndGoNext(this.getAttribute('data-href'));"
												th:attr="data-href=@{/employee/learning-development/{id}/{mode}/{hash}(id=${employee.id},mode=${employee.showMode},hash=${employee.empHashCode})}">
												Next: Learning and Development &#8594;
											</button>
										</div>
									</div>
									<!-- /PDS Section Navigation -->

								</div>
							</div>
							<!-- /dashboard content -->
							
														
					    </div>			    
					</div>
					<!-- /left content -->


					<!-- Right component Profile Pic -->
					<div class="sidebar sidebar-light bg-transparent sidebar-component sidebar-component-right wmin-100 border-0 shadow-0 order-1 order-md-2 sidebar-expand-md">

						<!-- Main sidebar -->
						<div th:replace="fragments/common::right-profile-content"></div>
						<!-- /Main sidebar -->
		
					</div>
					<!-- /right sidebar component -->

				</div>
				<!-- /inner container -->

			</div>
			<!-- /content area -->
		</div>
		<!-- /main content -->
	</div>
	<!-- /page content -->
	
	<!-- Main sidebar -->
	<div th:replace="fragments/common::footer"></div>
	<!-- /Main sidebar -->
	
	<script th:inline="javascript">
		// Validation helper for "Next" navigation across PDS sections
		function validateAndGoNext(nextUrl) {
			var missed = [];
			$('.required-field-hrisp:visible').each(function() {
				var v = $(this).val();
				if (!v || v.trim() === '') {
					var label = $('label[for="' + $(this).attr('id') + '"]').text().trim()
								|| $(this).attr('placeholder')
								|| $(this).attr('name')
								|| 'Unnamed field';
					missed.push(label);
				}
			});
			if (missed.length > 0) {
				swal({
					title: "Please fill required fields",
					text: missed.map(function(l, i) { return (i+1) + '. ' + l; }).join('\n'),
					icon: "warning"
				});
				return;
			}
			window.location.href = nextUrl;
		}

	    $(document).ready(function() {
			// ── Clear All Voluntary Work (CR-005) ──────────────────────────────
			$('#clearAllVwButton').click(function(){
				swal({
					title: "Clear ALL records?",
					text: "This permanently removes every voluntary work record for this employee.",
					icon: "warning",
					buttons: ["Cancel", "Yes, clear all"],
					dangerMode: true
				}).then(function(confirmed){
					if (confirmed) { $('#clearAllVwForm').submit(); }
				});
			});

			// ── Date Mask (dd/mm/yyyy ↔ yyyy-MM-dd) ──────────────────────────────
			$(document).on('input', '.date-mask-input', function() {
				var v = $(this).val().replace(/\D/g, '').substring(0, 8);
				if (v.length >= 3) v = v.substring(0,2) + '/' + v.substring(2);
				if (v.length >= 6) v = v.substring(0,5) + '/' + v.substring(5);
				$(this).val(v);
			});
			$(document).on('blur', '.date-mask-input', function() {
				var display = $(this).val().trim();
				var hiddenId = $(this).attr('id').replace('_display', '');
				var $hidden = $('#' + hiddenId);
				var $err = $(this).nextAll('.date-error').first();
				if (!display) { $hidden.val(''); $err.hide(); return; }
				var parts = display.split('/');
				if (parts.length !== 3) { $err.show(); return; }
				var dd = parts[0], mm = parts[1], yy = parts[2];
				var year = parseInt(yy, 10);
				if (yy.length <= 2) year += (year <= 49 ? 2000 : 1900);
				var d = new Date(year, parseInt(mm,10)-1, parseInt(dd,10));
				if (isNaN(d.getTime()) || d.getDate() != parseInt(dd,10) || (d.getMonth()+1) != parseInt(mm,10)) {
					$err.show(); $hidden.val(''); return;
				}
				$err.hide();
				$hidden.val(year + '-' + mm.padStart(2,'0') + '-' + dd.padStart(2,'0'));
			});
			$('.date-mask-input').each(function() {
				var hiddenId = $(this).attr('id').replace('_display', '');
				var iso = $('#' + hiddenId).val();
				if (iso && iso.length === 10) {
					var parts = iso.split('-');
					$(this).val(parts[2] + '/' + parts[1] + '/' + parts[0]);
				}
			});

	    	$('#consultation-list').DataTable({
				"lengthMenu": [10, 25, 50],
				"ordering": false, 
				
			});
	    		    				
			let showMode = /*[[${employee.showMode == null ? '' : employee.showMode} ]]*/'';
			
			if(showMode === 'PROFILE'){
				$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
				$("#myAccountNav").addClass("nav-item-expanded nav-item-open");
				$("#myPersonalInfoNav").addClass("active");

				$("#showMode").val("PROFILE");
			} else {
				$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
				$("#employeeManagementNav").addClass("nav-item-expanded nav-item-open");
				$("#employeeListNav").addClass("active");
				
				$("#showMode").val("HRADMIN");
			}

	    	let msgCode = /*[[${msg == null ? '' : msg.code} ]]*/'';
			let msgDesc = /*[[${msg == null ? '' : msg.message}]]*/'';

	    	if(msgCode === 'ERROR'){
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
			} else if(msgCode === 'EDIT-SUCCESS'){
				swal({
					title: "Success!",
					text: msgDesc,
					icon: "success",
					buttons: false,
		            timer: 2000,
				});
			}

	    });

		$(document).on("click", ".showDetails", function() {
			var id = $(this).attr('data-row-id');
			var orgName = $(this).attr('data-row-orgName');
			var dateFrom = $(this).attr('data-row-dateFrom');
			var dateTo = $(this).attr('data-row-dateTo');
			var upToPresent = $(this).attr('data-row-upToPresent');
			var noHours = $(this).attr('data-row-noHours'); 
			var natureOfWork = $(this).attr('data-row-natureOfWork');
			var address = $(this).attr('data-row-address');
					
			$("#modal_form_vertical").find("#id").val(id);
			$("#modal_form_vertical").find("#orgName").val(orgName);
			$("#modal_form_vertical").find("#dateFrom").val(dateFrom);
			if (dateFrom && dateFrom.length === 10) { var dfP = dateFrom.split('-'); $("#modal_form_vertical").find("#dateFrom_display").val(dfP[2]+'/'+dfP[1]+'/'+dfP[0]); } else { $("#modal_form_vertical").find("#dateFrom_display").val(''); }
			$("#modal_form_vertical").find("#dateTo").val(dateTo);
			if (dateTo && dateTo.length === 10) { var dtP = dateTo.split('-'); $("#modal_form_vertical").find("#dateTo_display").val(dtP[2]+'/'+dtP[1]+'/'+dtP[0]); } else { $("#modal_form_vertical").find("#dateTo_display").val(''); }
			$("#modal_form_vertical").find("#upToPresent").prop("checked", upToPresent === 'true');
			$("#modal_form_vertical").find("#noHours").val(noHours);
			$("#modal_form_vertical").find("#natureOfWork").val(natureOfWork);
			$("#modal_form_vertical").find("#address").val(address);   
		});

		$('#employeeForm').submit(function() {
			$('.date-mask-input').trigger('blur');
		});

	</script>

</body>
</html>
