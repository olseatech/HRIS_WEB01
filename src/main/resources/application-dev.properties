# MySQL DataSource config
spring.datasource.url=jdbc:mysql://localhost:3306/hris_01?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=Asia/Manila&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
