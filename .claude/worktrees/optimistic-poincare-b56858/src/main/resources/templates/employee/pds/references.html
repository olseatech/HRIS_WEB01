<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<th:block th:replace="fragments/common::header-meta"></th:block>
    <!-- common import of css & js goes here -->
    <th:block th:replace="fragments/common::header-import-css"></th:block>
    <th:block th:replace="fragments/common::header-import-js"></th:block>
	<title>Dashboard</title>
</head>
<body>
	<!-- Main Navbar -->
	<div th:replace="fragments/common::main-navbar"></div>
	<!-- /Main Navbar -->
	<!-- Page content -->
	<div class="page-content">
		<!-- Main sidebar -->
		<div th:replace="fragments/common::main-sidebarnav"></div>
		<!-- /Main sidebar -->

		<!-- Main content -->
		<div class="content-wrapper">
			<!-- Vertical form modal -->
			<div id="modal_form_vertical" class="modal fade" tabindex="-1">
				<div class="modal-dialog modal-lg">
					<div class="modal-content">
						<div class="modal-header bg-primary">
							<h5 class="modal-title">References Information</h5>
							<button type="button" class="close" data-dismiss="modal">&times;</button>
						</div>

						<form id="employeeForm" method="post" th:action="@{/addReferences}" th:object="${references}">
							<input type="hidden" th:field="*{id}" name="id" id="id">
							<input type="hidden" th:field="*{employee.id}" name="employeeId" id="employeeId">
							<input type="hidden" th:field="*{employee.empHashCode}" name="empHashCode" id="empHashCode">
							<input type="hidden" th:field="*{showMode}" name="showMode" id="showMode" value="">
							<div class="modal-body">
								
								<div class="form-group">
									<div class="row">
										<div class="col-sm-12">
											<label for="referenceName">Name</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('referenceName')}" th:errors="*{referenceName}"></span>
											<input id="referenceName" name="referenceName" th:field="*{referenceName}" placeholder="Name" type="text" class="form-control required-field-hrisp" >
										</div>											
									</div>
								</div>
								<div class="form-group">
									<div class="row">											
										<div class="col-sm-12">
											<label for="positionTitle">Position Title</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('positionTitle')}" th:errors="*{positionTitle}"></span>
											<input id="positionTitle" name="positionTitle" th:field="*{positionTitle}" placeholder="Position Title" type="text" class="form-control required-field-hrisp" >
										</div>	
										
									</div>
								</div>
								<div class="form-group">
									<div class="row">
										<div class="col-sm-12">
											<label for="companyAddress">Company/Home Address</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('companyAddress')}" th:errors="*{companyAddress}"></span>
											<input id="companyAddress" name="companyAddress" th:field="*{companyAddress}" placeholder="Company/Home Address" type="text" class="form-control required-field-hrisp" >
										</div>
									</div>
								</div>
								<div class="form-group">
									<div class="row">
										<div class="col-sm-12">
											<label for="companyContactNo">Company Telephone/Mobile Number</label>
											<span class="validationError text-danger" th:if="${#fields.hasErrors('companyContactNo')}" th:errors="*{companyContactNo}"></span>
											<input id="companyContactNo" name="companyContactNo" th:field="*{companyContactNo}" placeholder="Company Telephone/Mobile Number" type="text" class="form-control required-field-hrisp" >
										</div>
									</div>
								</div>
							</div>

							<div class="modal-footer">
								<button type="button" class="btn bg-primary" data-dismiss="modal">Close</button>
								<button id="submitBtn" type="submit" class="btn bg-primary">Save Info</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		    <!-- /Vertical form modal -->

			<div class="content">

				<!-- Inner container -->
				<div class="d-flex align-items-start flex-column flex-md-row">

					<!-- Left content -->
					<div class="tab-content w-100 order-2 order-md-1">
						<div class="tab-pane fade active show" id="activity">
							
							
							
							<!-- Dashboard content -->
							<div class="row mt-3">
								<div class="col-xl-12">
									
									
									<div class="card">
										<div class="card-header header-elements-inline">
											<h5 class="card-title">Reference Information</h5>
											<div class="header-elements">
												<div class="list-icons">				                				
									           		<button id="addButton" type="button" class="btn btn-primary" data-toggle="modal" data-target="#modal_form_vertical">Add Record</button>
									           	</div>
											</div>
										</div>
					
										<div class="card-body">
											List of All Reference Information. Type to search desired reference information.
										</div>
					
										<table class="table table-bordered table-hover datatable-highlight">
											<thead>
												<tr>
													<th width="150px;">&nbsp;</th>
													<th>Name</th>
													<th>Position Title</th>
													<th>Company/Home Address</th>	
													<th>Company Telephone/Mobile Number</th>	
												</tr>
											</thead>
											<tbody>
												<th:block th:each="references : ${referencesList}">
													<tr>
														
														<td class="text-center">
															<button id="editDegreeLevelButton" type="button" class="showDetails btn btn-primary"
															th:data-row-referenceName="${references.getReferenceName()}"
															th:data-row-positionTitle="${references.getPositionTitle()}"
															th:data-row-companyAddress="${references.getCompanyAddress()}"
															th:data-row-companyContactNo="${references.getCompanyContactNo()}"
															th:data-row-id="${references.getId()}"
															data-toggle="modal" data-target="#modal_form_vertical"
			                                                >View Record</button>
														</td>														
														
														<td th:text="${references.getReferenceName()}"></td>
														<td th:text="${references.getPositionTitle()}"></td>
														<td th:text="${references.getCompanyAddress()}"></td>
														<td th:text="${references.getCompanyContactNo()}"></td>

													</tr>
												</th:block>		

											</tbody>
										</table>
									</div>
									
									
											
								</div>
							</div>
							<!-- /dashboard content -->
							
														
					    </div>			    
					</div>
					<!-- /left content -->


					<!-- Right component Profile Pic -->
					<div class="sidebar sidebar-light bg-transparent sidebar-component sidebar-component-right wmin-100 border-0 shadow-0 order-1 order-md-2 sidebar-expand-md">

						<!-- Main sidebar -->
						<div th:replace="fragments/common::right-profile-content"></div>
						<!-- /Main sidebar -->
		
					</div>
					<!-- /right sidebar component -->

				</div>
				<!-- /inner container -->

			</div>
			<!-- /content area -->
		</div>
		<!-- /main content -->
	</div>
	<!-- /page content -->
	
	<!-- Main sidebar -->
	<div th:replace="fragments/common::footer"></div>
	<!-- /Main sidebar -->
	
	<script th:inline="javascript">		
	
	    $(document).ready(function() {
	    	
	    	$('#consultation-list').DataTable({
				"lengthMenu": [10, 25, 50],
				"ordering": false, 
				
			});
	    		    				
			let showMode = /*[[${employee.showMode == null ? '' : employee.showMode} ]]*/'';
			
			if(showMode === 'PROFILE'){
				$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
				$("#myAccountNav").addClass("nav-item-expanded nav-item-open");
				$("#myPersonalInfoNav").addClass("active");
				
				$('#addButton').hide();
				$('#submitBtn').hide();
				$('#updatePhotoBtn').hide();
				$('#cameraArea').hide();
				
				$('textarea').prop('readonly', true);
				$('input').prop('readonly', true);
				$('select').prop('disabled', true);
				$('input, select').removeClass("required-field-hrisp");
								
				$("#showMode").val("PROFILE");
			} else {
				$(".nav-item-submenu").removeClass("nav-item-expanded nav-item-open");
				$("#employeeManagementNav").addClass("nav-item-expanded nav-item-open");
				$("#employeeListNav").addClass("active");
				
				$("#showMode").val("HRADMIN");
			}

	    	let msgCode = /*[[${msg == null ? '' : msg.code} ]]*/'';
			let msgDesc = /*[[${msg == null ? '' : msg.message}]]*/'';

	    	if(msgCode === 'ERROR'){
				swal({
					title: "Error!",
					text: msgDesc,
					icon: "error",
					buttons: false,
		            timer: 2000,
				});
			} else if(msgCode === 'EDIT-SUCCESS'){
				swal({
					title: "Success!",
					text: msgDesc,
					icon: "success",
					buttons: false,
		            timer: 2000,
				});
			}

	    });

		$(document).on("click", ".showDetails", function() {

			var id = $(this).attr('data-row-id');
			var referenceName = $(this).attr('data-row-referenceName');
			var positionTitle = $(this).attr('data-row-positionTitle');
			var companyAddress = $(this).attr('data-row-companyAddress');
			var companyContactNo = $(this).attr('data-row-companyContactNo');
			
					
			$("#modal_form_vertical").find("#id").val(id);
			$("#modal_form_vertical").find("#referenceName").val(referenceName);
			$("#modal_form_vertical").find("#positionTitle").val(positionTitle);
			$("#modal_form_vertical").find("#companyAddress").val(companyAddress);
			$("#modal_form_vertical").find("#companyContactNo").val(companyContactNo);
		});


		

	</script>

</body>
</html>
