server.servlet.context-path=/hrisp
server.servlet.session.timeout=15m

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

file.upload-dir=/hrisp/uploads

# Spring Data REST
spring.data.rest.base-path=/api
spring.data.rest.detection-strategy=annotated

# PROD settings
spring.datasource.initialization-mode=never
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# MySQL DataSource config
spring.datasource.url=jdbc:mysql://localhost:3306/hrisp?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=cdsiadmin
